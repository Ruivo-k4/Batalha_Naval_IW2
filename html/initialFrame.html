<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><!--BoodStrap-->
    <link rel="stylesheet" href="../css/style-initFrame.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulo do JOGO</title>
</head>

<body>
    <!-- forms de login -->
    <div class="container">
        <audio src="../audios/somFundo.mpeg" id="musicInit"></audio>
        <div class="data">
            <form id="forms">
                <!--  parte onde põe o nome -->
                <input type="text" id="input-nome" placeholder="JogadorBala112" class="data_itens">
            </form>
    
            <label for="dificult" class="data_itens">
                <select name="dificult" id="c-dificult">
                    <option value="">Escolha uma dificuldade</option>
                    <option value="1">Fácil</option>
                    <option value="2">Médio</option>
                    <option value="3">Difícil</option>
                    <option value="4">Criativo</option>
                </select>
            </label>
            
            <a href="#" class="ancoraSubmit" id="directPag"><button id="submitDificult" class="data_itens">INICIAR</button></a>
        </div>

    
        <div class="forms_data">
            <a href="./initialFrame.html" id="reloadPag"><i class="bi bi-arrow-left-square"></i></a>

            <div class="form-header">
                <h1>PERSONALIZAÇÃO</h1>
                <h2 id="itensDisp">Itens: 0</h2>
            </div>

            <div id="configurate">
                <label for="size_camp">área Campo:<input type="number" min="3" max="10" id="size_camp"
                        name="campS_input" onkeydown="return false;"></label>
                <label for="qnt-lifes">Vidas: <input type="number" id="qnt-lifes" min="1" max="6"
                        name="ships-input" disabled onkeydown="return false;"></label>
                <label for="qnt-botes">Botes: <input type="number" id="qnt-botes"
                        name="ships-input" disabled onkeydown="return false;"></label>
                <label for="qnt-barcos">Barcos: <input type="number" id="qnt-barcos"
                        name="ships-input" disabled onkeydown="return false;"></label>
                <label for="qnt-navios">Quantidade de Navios:<input type="number" id="qnt-navios" name="ships-input"
                        disabled onkeydown="return false;"></label>
                <label for="qnt-bomb">"Quantidade de Bombas:"<input type="number" id="qnt-bomb" name="bombs-input"
                        disabled onkeydown="return false;"></label>
                <label for="qnt-wave">"Quantidade de agua:"<input type="number" id="qnt-wave" name="wave-input"
                        disabled onkeydown="return false;"></label>
                <a href="#" id="link_btn"><button id="configurate_btn">Iniciar Jogo</button></a>
            </div>
        </div>
    </div>

    <script type="module" src="../js/dificults.js"></script>
</body>
<!--
<i class="bi bi-arrow-left-square-fill"></i> seta preenchida
-->

</html>
